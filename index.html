/* ════════════════════════════════════
   API CALLER
════════════════════════════════════ */
async function callAPI(provider,apiKey,model,system,messages){
  if(provider==="anthropic"){
    const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model,max_tokens:2500,system,messages})});
    const d=await r.json();
    if(d.error)throw new Error(d.error.message);
    return d.content.map(b=>b.text||"").join("");
  }
  if(provider==="openai"||provider==="deepseek"){
    const url=provider==="deepseek"?"https://api.deepseek.com/v1/chat/completions":"https://api.openai.com/v1/chat/completions";
    const r=await fetch(url,{method:"POST",
      headers:{"Content-Type":"application/json","Authorization":`Bearer ${apiKey}`},
      body:JSON.stringify({model,max_tokens:2500,messages:[{role:"system",content:system},...messages]})});
    const d=await r.json();
    if(d.error)throw new Error(d.error.message||JSON.stringify(d.error));
    return d.choices[0].message.content;
  }
  if(provider==="gemini"){
    const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`,{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        systemInstruction:{parts:[{text:system}]},
        contents:messages.map(m=>({role:m.role==="assistant"?"model":"user",parts:[{text:m.content}]})),
        generationConfig:{maxOutputTokens:2500}
      })});
    const d=await r.json();
    if(d.error)throw new Error(d.error.message);
    return d.candidates[0].content.parts.map(p=>p.text||"").join("");
  }
  throw new Error("未知服务商");
}

function parseJSON(txt){
  try{const m=txt.match(/```json\s*([\s\S]*?)```/);return JSON.parse(m?m[1]:txt.trim());}
  catch{try{const s=txt.indexOf("{"),e=txt.lastIndexOf("}");if(s!==-1&&e!==-1)return JSON.parse(txt.slice(s,e+1));}catch{}return null;}
}
function fixNewlines(t){return t?t.replace(/\\n/g,"\n").replace(/\\t/g,"\t"):"";}

function StoryText({text,isEvent,news}){
  if(!text&&!news)return null;
  const clean=fixNewlines(text||"");
  const parts=clean.split(/(【心[：:]([^】]*)】)/g);
  const els=[];let i=0;
  while(i<parts.length){
    const p=parts[i];
    if(p&&/^【心[：:]/.test(p)){
      const inner=parts[i+1]||p.replace(/^【心[：:]/,"").replace(/】$/,"");
      els.push(<span key={i} className="thought">（{inner}）</span>);
      i+=2;
    } else {
      if(p){
        const lines=p.split("\n");
        lines.forEach((line,li)=>{
          els.push(<span key={`${i}-${li}`}>{line}</span>);
          if(li<lines.length-1)els.push(<br key={`${i}-br-${li}`}/>);
        });
      }
      i++;
    }
  }
  return(
    <div className="fade-in">
      {news&&(
        <div className="news-block">
          <div className="news-title">📰 《喧嚣城早报》</div>
          <div>{news}</div>
        </div>
      )}
      <div className={isEvent?"event-block":""} style={{lineHeight:2.0,fontSize:15,color:C.text}}>
        {els}
      </div>
    </div>
  );
}

  return(
    <div style={{minHeight:"100vh",display:"flex",justifyContent:"center"}}>
      <div style={{width:"100%",maxWidth:720,minHeight:"100vh",display:"flex",flexDirection:"column",background:C.bgTrans,boxShadow:`0 0 40px rgba(0,0,0,0.8)`}}>

        {/* HEADER */}
        <div style={{display:"flex",justifyContent:"space-between",padding:"10px 16px",background:C.bgD,borderBottom:`1px solid ${C.brd}`,fontSize:11,color:C.textM}}>
          <span>第 <b style={{color:C.acc}}>{day}</b>/{MAX_DAYS}天 &nbsp; 客人 <b style={{color:C.acc}}>{custIdx}</b>/4</span>
          <span style={{color:"#c4b030",fontWeight:"bold"}}>¥ {money}</span>
          <span>心境: {mcMindset} {isDemo?"[演示]":""}</span>
        </div>

        {/* CUSTOMER INFO */}
        {customer&&(
          <div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 16px",background:"rgba(255,255,255,0.02)",borderBottom:`1px solid ${C.brd}`,fontSize:12}}>
            <span style={{color:C.accB,fontWeight:"bold"}}>{customer.name}</span>
            {customer.is_main&&<span style={{color:C.purp,fontSize:10}}>★</span>}
            <span style={{color:C.textM,marginLeft:"auto"}}>熟悉度</span>
            <div style={{width:60,height:4,background:C.bgP,borderRadius:2}}>
              <div style={{height:"100%",background:C.teal,width:`${famDisp}%`}}/>
            </div>
            {sat&&<span style={{marginLeft:10,fontWeight:"bold",color:SAT[sat].c}}>{SAT[sat].l}</span>}
          </div>
        )}

        {/* STORY AREA */}
        {phase==="mixing"?(
          <div style={{flex:1,padding:"20px",overflowY:"auto"}}>
            <div style={{color:C.textM,fontSize:13,marginBottom:16}}>
              为 {customer?.name} 调酒（已选 {drink.length}/3）
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              {INGS.map(ing=>{
                const sel=drink.includes(ing.id);
                const noS=(stock[ing.id]||0)<1;
                return(
                  <button key={ing.id}
                    onClick={()=>{if(!noS){setDrink(p=>{if(p.includes(ing.id))return p.filter(x=>x!==ing.id);if(p.length>=3)return[...p.slice(1),ing.id];return[...p,ing.id];});}}}
                    style={{padding:"12px",textAlign:"left",background:sel?"rgba(196,144,48,0.15)":"rgba(0,0,0,0.5)",
                      border:`1px solid ${sel?C.acc:C.brd}`,cursor:noS?"not-allowed":"pointer",opacity:noS?.35:1}}>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <span style={{width:8,height:8,borderRadius:"50%",background:ing.col}}/>
                      <span style={{color:sel?C.accB:C.text,fontSize:13}}>{ing.name}</span>
                      <span style={{marginLeft:"auto",color:C.textM,fontSize:11}}>{stock[ing.id]||0}</span>
                    </div>
                    <div style={{marginTop:4,fontSize:10,color:C.accD}}>{ing.tags.join(" · ")}</div>
                  </button>
                );
              })}
            </div>
          </div>
        ):(
          <div ref={topRef} style={{flex:1,padding:"24px",overflowY:"auto"}}>
            {loading?<Spinner/>:<StoryText text={curText} isEvent={curPageData?.isEvent} news={curNews}/>}
          </div>
        )}

        {/* CONTROLS */}
        <div style={{padding:"16px",borderTop:`1px solid ${C.brd}`,background:C.bgD}}>
          {phase==="idle"&&!loading&&(
            <div style={{display:"flex",gap:10}}>
              <Btn onClick={nextCustomer} style={{flex:1}}>迎接下一位客人 →</Btn>
              <Btn onClick={()=>{setCart({});setPhase("shop");}} variant="out">进货</Btn>
            </div>
          )}
          {phase==="mixing"&&!loading&&(
            drink.length===3
              ?<Btn onClick={serveDrink} style={{width:"100%"}}>上酒 →</Btn>
              :<div style={{textAlign:"center",color:C.textM,fontSize:13}}>还需选择 {3-drink.length} 种原料</div>
          )}
          {!loading&&pageOpts===null&&nextFn&&phase!=="idle"&&phase!=="mixing"&&phase!=="end"&&(
            <Btn onClick={()=>{const f=nextFn.fn;setNextFn(null);f&&f();}} style={{width:"100%"}}>继续 ▶</Btn>
          )}
          {!loading&&pageOpts&&pageOpts.length>0&&(
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {pageOpts.map((opt,i)=>(
                <Btn key={i} variant="choice"
                  onClick={()=>{
                    if(phase==="boss_chat"){chooseBossOpt(i);return;}
                    // _farewell标记的选项直接送客，不再走chooseOpt里的AI调用
                    if(opt._farewell){doFarewell();return;}
                    chooseOpt(i);
                  }}>
                  {opt.text}
                </Btn>
              ))}
            </div>
          )}
          {phase==="end"&&!loading&&(
            <div style={{textAlign:"center"}}>
              <div style={{color:C.accB,marginBottom:16,fontSize:16}}>第{MAX_DAYS}天结束——黎明终于降临。</div>
              <Btn onClick={onReset} style={{width:"100%"}}>重新开始</Btn>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

/* ════════════════════════════════════
   APP CONTAINER
════════════════════════════════════ */
function App(){
  const [s,setS]=useState("intro");
  const [cfg,setCfg]=useState(null);

  return(
    <>
      <div style={{position:"fixed",top:0,left:0,width:"100%",height:"100%",zIndex:-1,
        backgroundImage:`url(${RES.bg_image})`,backgroundSize:"cover",backgroundPosition:"center"}}/>
      {s==="intro"?<IntroScreen onNext={()=>setS("api")}/>:
       s==="api"  ?<ApiScreen onConfirm={c=>{setCfg(c);setS("game");}}/>:
                   <Game cfg={cfg} onReset={()=>setS("intro")}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
