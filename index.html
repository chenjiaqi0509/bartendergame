async function callAPI(provider,apiKey,model,system,messages){
  if(provider==="anthropic"){
    const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01"},
      body:JSON.stringify({model,max_tokens:2500,system,messages})});
    const d=await r.json();
    if(d.error)throw new Error(d.error.message);
    return d.content.map(b=>b.text||"").join("");
  }
  if(provider==="openai"||provider==="deepseek"){
    const url=provider==="deepseek"?"https://api.deepseek.com/v1/chat/completions":"https://api.openai.com/v1/chat/completions";
    const r=await fetch(url,{method:"POST",
      headers:{"Content-Type":"application/json","Authorization":`Bearer ${apiKey}`},
      body:JSON.stringify({model,max_tokens:2500,messages:[{role:"system",content:system},...messages]})});
    const d=await r.json();
    if(d.error)throw new Error(d.error.message||JSON.stringify(d.error));
    return d.choices[0].message.content;
  }
  if(provider==="gemini"){
    const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`,{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        systemInstruction:{parts:[{text:system}]},
        contents:messages.map(m=>({role:m.role==="assistant"?"model":"user",parts:[{text:m.content}]})),
        generationConfig:{maxOutputTokens:2500}
      })});
    const d=await r.json();
    if(d.error)throw new Error(d.error.message);
    return d.candidates[0].content.parts.map(p=>p.text||"").join("");
  }
  throw new Error("未知服务商");
}

function parseJSON(txt){
  try{const m=txt.match(/```json\s*([\s\S]*?)```/);return JSON.parse(m?m[1]:txt.trim());}
  catch{try{const s=txt.indexOf("{"),e=txt.lastIndexOf("}");if(s!==-1&&e!==-1)return JSON.parse(txt.slice(s,e+1));}catch{}return null;}
}
function fixNewlines(t){return t?t.replace(/\\n/g,"\n").replace(/\\t/g,"\t"):"";}

function StoryText({text,isEvent,news}){
  if(!text&&!news)return null;
  const clean=fixNewlines(text||"");
  const parts=clean.split(/(【心[：:]([^】]*)】)/g);
  const els=[];let i=0;
  while(i<parts.length){
    const p=parts[i];
    if(p&&/^【心[：:]/.test(p)){
      const inner=parts[i+1]||p.replace(/^【心[：:]/,"").replace(/】$/,"");
      els.push(<span key={i} className="thought">（{inner}）</span>);
      i+=2;
    } else {
      if(p){
        const lines=p.split("\n");
        lines.forEach((line,li)=>{
          els.push(<span key={`${i}-${li}`}>{line}</span>);
          if(li<lines.length-1)els.push(<br key={`${i}-br-${li}`}/>);
        });
      }
      i++;
    }
  }
  return(
    <div className="fade-in">
      {news && (
        <div className="news-block">
          <div className="news-title">📰 《喧嚣城早报》</div>
          <div>{news}</div>
        </div>
      )}
      <div className={isEvent?"event-block":""} style={{lineHeight:2.0,fontSize:15,color:C.text}}>
        {els}
      </div>
    </div>
  );
}

function Panel({children,style}){
  const cs={position:"relative",border:`1px solid ${C.brd}`,background:C.bgP,backdropFilter:"blur(5px)",...style};
  const corner=(top,right,bottom,left)=>({
    position:"absolute",...(top!=null?{top:0}:{}),...(bottom!=null?{bottom:0}:{}),...(left!=null?{left:0}:{}),...(right!=null?{right:0}:{}),
    width:8,height:8,borderTop:top?`2px solid ${C.acc}`:"none",borderBottom:bottom?`2px solid ${C.acc}`:"none",
    borderLeft:left?`2px solid ${C.acc}`:"none",borderRight:right?`2px solid ${C.acc}`:"none",
  });
  return(
    <div style={cs}>
      <span style={corner(true,null,null,true)}/><span style={corner(true,true,null,null)}/>
      <span style={corner(null,null,true,true)}/><span style={corner(null,true,true,null)}/>
      {children}
    </div>
  );
}

const SAT={high:{l:"★★★ 非常满意",c:"#e8c040"},mid:{l:"★★☆ 还算满意",c:"#a07828"},low:{l:"★☆☆ 不太对味",c:"#686868"}};
const TAG_LIST = ["烈","甜","苦","酸","清冽","果香","草本","木香","海洋","神秘","温柔","科技感","纯粹","花香"];

/* ════════════════════════════════════
   MAIN GAME
════════════════════════════════════ */
function Game({cfg,onReset}){
  const {provider,apiKey,model}=cfg;

  const [day,setDay]=useState(1);
  const [money,setMoney]=useState(500);
  const [rep,setRep]=useState(50);
  const [stock,setStock]=useState(INIT_STOCK);
  const [bossRel,setBossRel]=useState(50);
  const [mcMindset,setMcMindset]=useState(20); 
  
  const [npcMem,setNpcMem]=useState({});
  const [newsHistory,setNewsHistory]=useState([]);
  const [gLog,setGLog]=useState([]);

  const [phase,setPhase]=useState("loading");
  const [storyPages,setStoryPages]=useState([]);
  const [pageOpts,setPageOpts]=useState(null);
  const [loading,setLoading]=useState(false);
  const [nextFn,setNextFn]=useState(null);
  const [chatCount,setChatCount]=useState(0);

  const [custIdx,setCustIdx]=useState(0);
  const [dayDone,setDayDone]=useState(false);
  const [customer,setCustomer]=useState(null);
  const [drink,setDrink]=useState([]);
  const [sat,setSat]=useState(null);
  const [msgHist,setMsgHist]=useState([]);
  const [cart,setCart]=useState({});

  const topRef=useRef(null);
  const audioRef=useRef(new Audio());

  useEffect(()=>{ if(topRef.current)topRef.current.scrollTop=0; },[storyPages.length,phase]);

  // ── MUSIC ──
  useEffect(()=>{
    const a = audioRef.current;
    a.loop = true; a.volume = 0.4;
    const targetSrc = day % 5 === 0 ? RES.bgm_remix : RES.bgm_normal;
    if(a.src !== targetSrc) { a.src = targetSrc; a.play().catch(()=>{}); }
    return () => { a.pause(); };
  }, [day]);
  useEffect(()=>{
    if(phase !== 'loading' && audioRef.current.paused && audioRef.current.src) audioRef.current.play().catch(()=>{});
  }, [phase]);

  const ai=async(messages)=>callAPI(provider,apiKey,model,SYS,messages);
  const addLog=e=>setGLog(l=>[...l,{day,...e}]);
  const updNpc=(name,u)=>setNpcMem(m=>({...m,[name]:{...(m[name]||{familiarity:0,profile:"",visitCount:0,lastTopics:[]}), ...u}}));

  function pushPage(text,isEvent,news,opts,next){
    setStoryPages(p=>[...p,{text,isEvent:!!isEvent,news}]);
    setPageOpts(opts||null);
    setNextFn(next?{fn:next}:null);
    setPhase("story");
  }

  // ── DAY START ──
  async function startDay(d,curMoney){
    setPhase("loading");setLoading(true);
    setStoryPages([]); setCustIdx(0); setDayDone(false); setSat(null); setDrink([]); setCustomer(null);
    
    const ENVS = [
      "暴雨如注，酸雨腐蚀着窗外的霓虹灯牌", "罕见的干燥夜晚，远处传来浮空车的轰鸣",
      "浓重的雾霾笼罩街道，能见度极低", "街道对面的全息广告牌故障了，发出刺耳的噪音",
      "今晚异常安静，只有通风管道的嗡嗡声", "远处似乎发生了爆炸，警笛声此起彼伏"
    ];
    const rndEnv = ENVS[Math.floor(Math.random()*ENVS.length)];
    const bad=d%5===0;

    const p=`第${d}天营业前。主控心理值(Mindset)：${mcMindset}（0=想死, 100=重新渴望活着）。${bad?"今天是状态极差的五倍数天。":""}
外界环境：${rndEnv}。
请生成：
1. 【news】：一段喧嚣城的《早报》新闻（因为是官方的，所以会隐瞒一些事情。约60字，涉及暗潮、记忆买卖、评级或黑市。不要和以往新闻重复：${newsHistory.join('; ')}）。
2. 【text】：开店前的描写与主控内心【心：...】（约200字）。【严禁描写罗德西或任何客人在场，店里还没人进门】。
返回JSON：{"news":"新闻文本","text":"环境与内心描写"}`;

    const msgs=[{role:"user",content:p}];
    const resp=await ai(msgs);
    const parsed=parseJSON(resp);
    setMsgHist(msgs.concat([{role:"assistant",content:resp}]));
    if(parsed?.news) setNewsHistory(h=>[...h.slice(-5), parsed.news]);
    setLoading(false);
    pushPage(parsed?.text||resp, false, parsed?.news, null, ()=>setPhase("idle"));
  }

  useEffect(()=>{ startDay(1,500); },[]);

  // ── NEXT CUSTOMER ──
  async function nextCustomer(){
    if(dayDone||custIdx>=4){await runEndDay();return;}
    setPhase("loading");setLoading(true);
    setDrink([]);setSat(null); setChatCount(0);

    const MAIN=["渡野","拉普瑟狄","罗德西","万寂·维里塔","千明·维里塔","希音","塞西里斯"];
    const w=[0.25, 0.25, 0.15, 0.10, 0.10, 0.10, 0.05];
    const MINOR=["露比","影子","柯恩","米洛","布蕾尔","叶菲姆","瑟琳","维拉","安琪","纪和","老关","小湘","阿卷"];
    
    const roll=Math.random();
    let npcName=null;
    if(roll<0.30){
      let r2=Math.random(),acc=0;
      for(let i=0;i<MAIN.length;i++){acc+=w[i];if(r2<acc){npcName=MAIN[i];break;}}
    } else if(roll<0.75){
      npcName=MINOR[Math.floor(Math.random()*MINOR.length)];
    }

    const mem=npcName?(npcMem[npcName]||{familiarity:0,profile:"",visitCount:0,lastTopics:[]}):null;
    const fam=mem?.familiarity||0;
    const visits=mem?.visitCount||0;
    const isMain=MAIN.includes(npcName);

    let loreToInject = "";
    if(npcName && NPC_DB[npcName]) {
        const db = NPC_DB[npcName];
        loreToInject = `【核心设定】：${db.desc}\n`;
        if(db.steps) {
             loreToInject += `【行为指南】：${db.steps[Math.min(visits, 2)]}`;
        } else {
            if(fam<40) loreToInject += `【当前熟悉度阶段】：${db.f0_40}`;
            else if(fam<70) loreToInject += `【当前熟悉度阶段】：${db.f40_70}`;
            else loreToInject += `【当前熟悉度阶段】：${db.f70_plus}`;
        }
    } else {
        loreToInject = "随机路人NPC，从底层打工人/帮派/情报贩子中选一种。";
    }

    const prompt=`第${day}天，第${custIdx+1}位客人。
来客：${npcName||"随机路人"}。熟悉度：${fam}。已来过${visits}次。
主控心理值：${mcMindset}。
${loreToInject}

生成场景（600-800字）：
1. 详细描写他推门而入的外貌与动作。
2. 主控非常冷淡，即使是熟人也只用动作/眼神交流。
3. 像写小说一样把角色的特点写出来。
4. 提供3个调酒标签，【必须且只能】从以下列表中精确复制，严禁自己发明词汇：[${TAG_LIST.join(",")}]。
返回JSON：{"name":"名字","profile":"性格","preference_tags":["标签1","标签2","标签3"],"is_main":${isMain},"text":"场景描写"}`;

    const msgs=[...msgHist,{role:"user",content:prompt}];
    const resp=await ai(msgs);
    const parsed=parseJSON(resp);
    if(parsed){
      setCustomer({...parsed,memKey:npcName,familiarity:fam});
      setMsgHist(msgs.concat([{role:"assistant",content:resp}]));
      if(npcName)updNpc(npcName,{visitCount:visits+1,profile:parsed.profile||mem?.profile||"",familiarity:fam});
    }
    setLoading(false);
    pushPage(parsed?.text||resp,false,null,null,()=>setPhase("mixing"));
  }

  // ── SERVE DRINK ──
  async function serveDrink(){
    if(drink.length!==3)return;
    for(const id of drink){if((stock[id]||0)<1){alert("库存不足！");return;}}
    setPhase("loading");setLoading(true);
    const ns={...stock};for(const id of drink)ns[id]=(ns[id]||0)-1;setStock(ns);
    
    const names=drink.map(id=>INGS.find(i=>i.id===id)?.name);
    const tags=[...new Set(drink.flatMap(id=>INGS.find(i=>i.id===id)?.tags||[]))];
    const pref=(customer?.preference_tags||[]).map(t=>t.trim());
    
    let matches=0;
    pref.forEach(pTag => { if(tags.some(t => t.includes(pTag) || pTag.includes(t))) matches++; });
    
    const satRes=matches>=2?"high":matches===1?"mid":"low";
    setRep(r=>Math.max(0,Math.min(100,r+(satRes==="high"?5:satRes==="mid"?2:-2))));
    setMoney(m=>m+DRINK_PRICE);setSat(satRes);
    
    const fam=customer?.memKey?(npcMem[customer.memKey]?.familiarity??0):(customer?.familiarity??0);
    setChatCount(1); 

    let db = customer?.memKey ? NPC_DB[customer.memKey] : null;
    let behavior = db ? (fam<40 ? (db.f0_40 || db.steps[0]) : (fam<70 ? (db.f40_70||db.steps[1]) : (db.f70_plus||db.steps[2]))) : "普通回应";

    const prompt=`客人饮用：${names.join("+")}。匹配度：${satRes==="high"?"高满意":satRes==="mid"?"中等":"不满意"}。熟悉度：${fam}。
根据该客人设定的表现规则：【${behavior}】
生成：
1. 简短品酒反应。
2. 给出2-3个主控对话选项。如果熟悉度<60，选项必须冷漠/只聊酒。
返回JSON：{"text":"品酒反应","options":[{"id":0,"text":"选项"},{"id":1,"text":"送客"}]}`;
    const msgs=[...msgHist,{role:"user",content:prompt}];
    const resp=await ai(msgs);
    const parsed=parseJSON(resp);
    if(parsed){setMsgHist(msgs.concat([{role:"assistant",content:resp}]));}
    addLog({type:"drink",customer:customer?.name,sat:satRes,drink:names.join("+")});
    setLoading(false);
    if(parsed)pushPage(parsed.text,false,null,parsed.options);
  }

  async function chooseOpt(idx){
    const opt=pageOpts?.[idx];if(!opt)return;
    const fare=["送客","告别","结束","不想聊","嗯。","好了"].some(k=>opt.text.includes(k));
    if(fare&&phase!=="boss_chat"){await doFarewell();return;}
    if(fare&&phase==="boss_chat"){await afterBoss();return;}
    setPhase("loading");setLoading(true);

    const newCount = chatCount + 1; setChatCount(newCount);
    const forceEnd = newCount >= 3;

    const memKey=customer?.memKey;
    const mem=memKey?(npcMem[memKey]||{}):{};
    const fam=mem?.familiarity??customer?.familiarity??0;
    const topics=mem?.lastTopics||[];
    
    // Check for random event
    let eventTrigger = null;
    if(Math.random() < 0.12 && !forceEnd) {
       eventTrigger = EVENTS[Math.floor(Math.random()*EVENTS.length)];
    }

    let db = customer?.memKey ? NPC_DB[customer.memKey] : null;
    let behavior = db ? (fam<40 ? (db.f0_40 || db.steps[0]) : (fam<70 ? (db.f40_70||db.steps[1]) : (db.f70_plus||db.steps[2]))) : "闲聊";

    const prompt=`玩家说：「${opt.text}」。第${newCount}轮对话。主控心理：${mcMindset}。熟悉度：${fam}。
${eventTrigger ? `【警告：触发突发事件】${eventTrigger}\n请直接描写这个突发事件如何打断了对话，以及客人的反应。` : `请根据设定【${behavior}】回应。若熟悉度>70，可透露核心秘密或世界怪事。`}
要求：
1. 150-200字。
2. ${eventTrigger ? "事件发生后对话必须终止，只给'护送客人离开'选项。" : (forceEnd ? "这是最后一轮，只给一个'送客'选项。" : "给2个新选项。")}
返回JSON：{"text":"内容","quality":"good/bad","familiarity_gain":数字,"topics":["话题"],"options":[{"id":1,"text":"送客"}]}`;
    
    const msgs=[...msgHist,{role:"user",content:prompt}];
    const resp=await ai(msgs);

    if(parsed){
      const nf=Math.max(0,Math.min(100,fam+(parsed.familiarity_gain||0)));

      if(parsed.quality==='good') setMcMindset(m=>Math.min(100, m+4));
      else if(parsed.quality==='bad') setMcMindset(m=>Math.max(0, m-4));

      setMsgHist(msgs.concat([{role:"assistant",content:resp}]));
      if(eventTrigger) addLog({type:"special_event"});
      setLoading(false);
      pushPage(parsed.text, !!eventTrigger, null, parsed.options);
    } else setLoading(false);
  }

  // ── FAREWELL ──
  async function doFarewell(){
    setPhase("loading");setLoading(true);
    const prompt=`客人离开。生成50字内的送客描写，主控根据Mindset（${mcMindset}）表现出厌世或微弱的人情味。
返回JSON：{"text":"..."}`;

  async function runEndDay(){
    setPhase("loading");setLoading(true);

返回JSON：{"text":"..."}`;

  async function doBossChat(){
    setPhase("boss_chat");setLoading(true);
    const prompt=`打烊后，老板和主控对话。
主控心理值：${mcMindset}（0=想死，100=稍微找到干劲）。老板很敏锐，会根据主控心理状态说出符合他风格的话（靠谱、护短、话少）。

    const msgs=[...msgHist,{role:"user",content:prompt}];

  async function chooseBossOpt(idx){
    const opt=pageOpts?.[idx];if(!opt)return;
    if(["算了","不想聊","嗯。","结束","休息"].some(k=>opt.text.includes(k))){await afterBoss();return;}
    setPhase("loading");setLoading(true);
    const prompt=`主控说：「${opt.text}」。老板最后回一句话结束今天。
返回JSON：{"text":"...","options":[{"id":1,"text":"好了，去休息了"}]}`;
    const msgs=[...msgHist,{role:"user",content:prompt}];

      setMsgHist(msgs.concat([{role:"assistant",content:resp}]));
      setLoading(false);
      pushPage(parsed.text,false,null,parsed.options);
      setPhase("boss_chat");

  async function afterBoss(){
    if(day>=MAX_DAYS){setPhase("end"); return;}
    setDay(d=>d+1);
    await startDay(day+1);
  }

  // ── SHOP ──
  const cartTotal=()=>Object.entries(cart).reduce((s,[id,cnt])=>s+(ING_PRICE[id]||0)*cnt,0);
  function confirmBuy(){
    const t=cartTotal();
    if(t>money){alert("资金不足！");return;}
    setMoney(m=>m-t);
    setStock(s=>{const n={...s};Object.entries(cart).forEach(([id,cnt])=>{n[id]=(n[id]||0)+cnt;});return n;});
    setCart({});setPhase("idle");
  }

  // ── RENDER ──
  const curPageData=storyPages[storyPages.length-1];
  const curText=curPageData?.text||"";
  const curNews=curPageData?.news||"";
  const famDisp=(()=>{if(!customer)return 0;if(customer.memKey&&npcMem[customer.memKey])return npcMem[customer.memKey].familiarity;return customer.familiarity||0;})();

  if(phase==="shop") return(
    <div style={{minHeight:"100vh",display:"flex",justifyContent:"center",padding:"20px 16px",background:C.bgTrans}}>
      <div style={{width:"100%",maxWidth:640}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,color:C.accD,fontSize:12}}>
          <span>进货补给站</span><span style={{color:"#e8c040"}}>¥ {money}</span><span>购物车 ¥{cartTotal()}</span>
        </div>
        <Panel style={{padding:14,marginBottom:12}}>
          {INGS.map(ing=>(
            <div key={ing.id} style={{display:"flex",alignItems:"center",gap:8,padding:"9px 4px",borderBottom:`1px solid ${C.brd}`}}>
              <span style={{width:7,height:7,borderRadius:"50%",background:ing.col,flexShrink:0}}/>
              <div style={{flex:1}}><div style={{color:C.text,fontSize:13}}>{ing.name}</div></div>
              <span style={{color:C.textM,fontSize:11,width:48}}>库存 {stock[ing.id]||0}</span>
              <span style={{color:"#a07828",fontSize:11,width:40}}>¥{ING_PRICE[ing.id]}</span>
              <button onClick={()=>{setCart(c=>{const n={...c};if(n[ing.id]>1)n[ing.id]--;else delete n[ing.id];return n;})}} style={{background:"none",border:"none",color:C.textM,cursor:"pointer",fontSize:16}}>－</button>
              <span style={{color:C.acc,width:18,textAlign:"center"}}>{cart[ing.id]||0}</span>
              <button onClick={()=>setCart(c=>({...c,[ing.id]:(c[ing.id]||0)+1}))} style={{background:"none",border:"none",color:C.textM,cursor:"pointer",fontSize:16}}>＋</button>
            </div>
          ))}
        </Panel>
        <div style={{display:"flex",gap:8}}>
          <Btn onClick={confirmBuy} disabled={cartTotal()===0} style={{flex:1}}>确认购买 ¥{cartTotal()}</Btn>
          <Btn onClick={()=>setPhase("idle")} variant="out">返回</Btn>
        </div>
      </div>
    </div>
  );

  return(
    <div style={{minHeight:"100vh",display:"flex",justifyContent:"center"}}>
      <div style={{width:"100%",maxWidth:720,minHeight:"100vh",display:"flex",flexDirection:"column",background:C.bgTrans,boxShadow:`0 0 40px rgba(0,0,0,0.8)`}}>
        
        {/* HEADER */}
        <div style={{display:"flex",justifyContent:"space-between",padding:"10px 16px",background:C.bgD,borderBottom:`1px solid ${C.brd}`,fontSize:11,color:C.textM}}>
          <span>第 <b style={{color:C.acc}}>{day}</b>/30天 &nbsp; 客人 <b style={{color:C.acc}}>{custIdx}</b>/4</span>
          <span style={{color:"#c4b030",fontWeight:"bold"}}>¥ {money}</span>
          <span>心境值: {mcMindset}</span>
        </div>

        {/* CUSTOMER INFO */}
        {customer&&(
          <div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 16px",background:"rgba(255,255,255,0.02)",borderBottom:`1px solid ${C.brd}`,fontSize:12}}>
            <span style={{color:C.accB,fontWeight:"bold"}}>{customer.name}</span>
            {customer.is_main&&<span style={{color:C.purp,fontSize:10}}>★</span>}
            <span style={{color:C.textM,marginLeft:"auto"}}>熟悉度</span>
            <div style={{width:60,height:4,background:C.bgP,borderRadius:2}}><div style={{height:"100%",background:C.teal,width:`${famDisp}%`}}/></div>
            {sat&&<span style={{marginLeft:10,fontWeight:"bold",color:SAT[sat].c}}>{SAT[sat].l}</span>}
          </div>
        )}

        {/* STORY AREA */}
        {phase==="mixing"?(
          <div style={{flex:1,padding:"20px",overflowY:"auto"}}>
            <div style={{color:C.textM,fontSize:13,marginBottom:16}}>为 {customer?.name} 调酒（已选 {drink.length}/3）</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              {INGS.map(ing=>{
                const sel=drink.includes(ing.id); const noS=(stock[ing.id]||0)<1;
                return(
                  <button key={ing.id} onClick={()=>{if(!noS){setDrink(p=>{if(p.includes(ing.id))return p.filter(x=>x!==ing.id);if(p.length>=3)return[...p.slice(1),ing.id];return[...p,ing.id];});}}}
                    style={{padding:"12px",textAlign:"left",background:sel?"rgba(196,144,48,0.15)":"rgba(0,0,0,0.5)",border:`1px solid ${sel?C.acc:C.brd}`,cursor:noS?"not-allowed":"pointer",opacity:noS?.35:1}}>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <span style={{width:8,height:8,borderRadius:"50%",background:ing.col}}/>
                      <span style={{color:sel?C.accB:C.text,fontSize:13}}>{ing.name}</span>
                      <span style={{marginLeft:"auto",color:C.textM,fontSize:11}}>{stock[ing.id]||0}</span>
                    </div>
                  </button>
                );
              })}
            </div>
          </div>
        ):(
          <div ref={topRef} style={{flex:1,padding:"24px",overflowY:"auto"}}>
            {loading ? <Spinner/> : <StoryText text={curText} isEvent={curPageData?.isEvent} news={curNews} />}
          </div>
        )}

        {/* CONTROLS */}
        <div style={{padding:"16px",borderTop:`1px solid ${C.brd}`,background:C.bgD}}>
          {phase==="idle"&&!loading&&(
            <div style={{display:"flex",gap:10}}>
              <Btn onClick={nextCustomer} style={{flex:1}}>迎接下一位客人 →</Btn>
              <Btn onClick={()=>{setCart({});setPhase("shop");}} variant="out">进货</Btn>
            </div>
          )}
          {phase==="mixing"&&!loading&&(
            drink.length===3 ? <Btn onClick={serveDrink} style={{width:"100%"}}>上酒 →</Btn> : <div style={{textAlign:"center",color:C.textM,fontSize:13}}>还需选择 {3-drink.length} 种原料</div>
          )}
          {!loading&&pageOpts===null&&nextFn&&phase!=="idle"&&phase!=="mixing"&&phase!=="end"&&(
            <Btn onClick={()=>{const f=nextFn.fn;setNextFn(null);f&&f();}} style={{width:"100%"}}>继续 ▶</Btn>
          )}
          {!loading&&pageOpts&&pageOpts.length>0&&(
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {pageOpts.map((opt,i)=>(<Btn key={i} variant="choice" onClick={()=>phase==="boss_chat"?chooseBossOpt(i):chooseOpt(i)}>{opt.text}</Btn>))}
            </div>
          )}
          {phase==="end"&&!loading&&(<Btn onClick={onReset} style={{width:"100%"}}>重新开始</Btn>)}
        </div>
      </div>
    </div>
  );
}

/* ════════════════════════════════════
   APP CONTAINER
════════════════════════════════════ */
function App(){
  const [s,setS]=useState("intro");
  const [cfg,setCfg]=useState(null);
  
  return (
    <>
      <div style={{position:"fixed",top:0,left:0,width:"100%",height:"100%",zIndex:-1,backgroundImage:`url(${RES.bg_image})`,backgroundSize:"cover",backgroundPosition:"center"}}/>
      {s==="intro" ? <IntroScreen onNext={()=>setS("api")}/> :
       s==="api"   ? <ApiScreen onConfirm={c=>{setCfg(c);setS("title");}}/> :
       <Game cfg={cfg} onReset={()=>setS("intro")}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
