};

async function callAPI(provider,apiKey,model,system,messages){
  if(provider==="anthropic"){
    const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01"},
      body:JSON.stringify({model,max_tokens:2000,system,messages})});
    const d=await r.json();
    if(d.error)throw new Error(d.error.message);
    return d.content.map(b=>b.text||"").join("");
  }
  if(provider==="openai"||provider==="deepseek"){
    const url=provider==="deepseek"?"https://api.deepseek.com/v1/chat/completions":"https://api.openai.com/v1/chat/completions";
    const r=await fetch(url,{method:"POST",
      headers:{"Content-Type":"application/json","Authorization":`Bearer ${apiKey}`},
      body:JSON.stringify({model,max_tokens:2000,messages:[{role:"system",content:system},...messages]})});
    const d=await r.json();
    if(d.error)throw new Error(d.error.message||JSON.stringify(d.error));
    return d.choices[0].message.content;
  }
  if(provider==="gemini"){
    const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`,{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        systemInstruction:{parts:[{text:system}]},
        contents:messages.map(m=>({role:m.role==="assistant"?"model":"user",parts:[{text:m.content}]})),
        generationConfig:{maxOutputTokens:2000}
      })});
    const d=await r.json();
    if(d.error)throw new Error(d.error.message);
    return d.candidates[0].content.parts.map(p=>p.text||"").join("");
  }
  throw new Error("未知服务商");
}

async function testAPI(provider,apiKey,model){
  return callAPI(provider,apiKey,model,"You are helpful.",[{role:"user",content:"hi just say ok"}]);

function parseJSON(txt){
  try{const m=txt.match(/```json\s*([\s\S]*?)```/);return JSON.parse(m?m[1]:txt.trim());}
  catch{try{const s=txt.indexOf("{"),e=txt.lastIndexOf("}");if(s!==-1&&e!==-1)return JSON.parse(txt.slice(s,e+1));}catch{}return null;}
}

// Fix escaped \n from JSON strings
function fixNewlines(t){return t?t.replace(/\\n/g,"\n").replace(/\\t/g,"\t"):"";}

/* ════════════════════════════════════
   STORY TEXT RENDERER
════════════════════════════════════ */
function StoryText({text,isEvent}){
  if(!text)return null;
  const clean=fixNewlines(text);
  // split on 【心：...】 or 【心:...】
  const parts=clean.split(/(【心[：:]([^】]*)】)/g);
  const els=[];let i=0;
  while(i<parts.length){
    const p=parts[i];
    if(p&&/^【心[：:]/.test(p)){
      const inner=parts[i+1]||p.replace(/^【心[：:]/,"").replace(/】$/,"");
      els.push(<span key={i} className="thought">（{inner}）</span>);
      i+=2;
    } else {
      if(p){
        const lines=p.split("\n");
        lines.forEach((line,li)=>{
          els.push(<span key={`${i}-${li}`}>{line}</span>);
          if(li<lines.length-1)els.push(<br key={`${i}-br-${li}`}/>);
        });
      }
      i++;
    }
  }
  return(
    <div className={isEvent?"event-block":""} style={{lineHeight:2.0,fontSize:15,color:C.text}}>
      {els}
    </div>
  );
}

    borderTop:top?`2px solid ${C.acc}`:"none",

    borderLeft:left?`2px solid ${C.acc}`:"none",
    borderRight:right?`2px solid ${C.acc}`:"none",

}

function Btn({children,onClick,disabled,variant="norm",style}){

【世界观】
喧嚣城：赛博朋克城市。"暗潮"是黑色烟雾，暴露其中意识失控最终消失。RC/RI评级制度，低评级者受歧视，催生反抗组织"无印"。义体改造普遍，仿生人存在（多为性爱/表演用途）。记忆可被提取贩卖，提取多了变成空壳人。暗潮美学亚文化、噪音崇拜教派、记忆黑市并存。

【酒吧】表面普通酒吧，实为各方势力地下联络点。老板做情报生意，绝对中立，看起来有点凶但靠谱有原则，会保护酒吧和主控。

【主控】21岁，性别不体现，13岁父母双亡，在喧嚣城讨生活至今。
性格：极度悲观消沉，认为世界烂透了。工作时切换"营业状态"，礼貌得体不把情绪带给顾客。
每逢5的倍数天状态特别差，内心活动更阴暗消沉。
所有场景必须穿插主控内心活动，格式：【心：...内容...】，简短真实，穿插在叙述之间。

              "喧嚣城是那种靠着噪音和混乱维持秩序的地方。义体改造就像换衣服，仿生人和真人挤在同一张桌子喝酒，被评级系统贴了标签的人，活得连一条流浪狗都不如。",
              "三天前，老板找到你，说他的酒吧需要一个酒保。你接下了这份工作。表面上，这里是一家普通的小酒馆，夜晚营业到凌晨四点。但你在第一天就发现，进这扇门的客人，没有几个是单纯来喝酒的。",
            ].map((p,i)=><p key={i} style={{marginBottom:14}}>{p}</p>)}
            <p style={{color:C.textM,fontSize:13,fontStyle:"italic"}}>你不在乎。你从来都不在乎这种事。这个世界烂透了，但你还需要活下去，而活下去需要钱。</p>
          </div>
          <Btn onClick={onNext} style={{width:"100%",padding:"14px 0",letterSpacing:3,marginTop:28}}>我明白了，开始吧 →</Btn>
        </Panel>
      </div>
    </div>
  );
}

            <b style={{color:C.textM}}>获取 Key 的地址：</b><br/>
            Anthropic：console.anthropic.com<br/>
            OpenAI：platform.openai.com<br/>
            DeepSeek：platform.deepseek.com<br/>
            Gemini：aistudio.google.com

          {err&&<div style={{color:C.red,fontSize:12,marginBottom:10,lineHeight:1.6}}>{err}</div>}

/* ════════════════════════════════════
   MAIN GAME
════════════════════════════════════ */
function Game({cfg,onReset}){
  const {provider,apiKey,model}=cfg;

  const [day,setDay]=useState(1);
  const [money,setMoney]=useState(500);
  const [rep,setRep]=useState(50);
  const [stock,setStock]=useState(INIT_STOCK);
  const [bossRel,setBossRel]=useState(50);
  const [npcMem,setNpcMem]=useState({});
  const [gLog,setGLog]=useState([]);

  const [phase,setPhase]=useState("loading"); // loading|story|mixing|shop|end
  const [storyPages,setStoryPages]=useState([]); // {text,isEvent}
  const [curPage,setCurPage]=useState(0);
  const [pageOpts,setPageOpts]=useState(null); // null=continue arr=choices
  const [loading,setLoading]=useState(false);
  const [nextFn,setNextFn]=useState(null);

  const [custIdx,setCustIdx]=useState(0);
  const [dayDone,setDayDone]=useState(false);
  const [customer,setCustomer]=useState(null);
  const [drink,setDrink]=useState([]);
  const [sat,setSat]=useState(null);
  const [msgHist,setMsgHist]=useState([]);
  const [cart,setCart]=useState({});

  const topRef=useRef(null);

  useEffect(()=>{ if(topRef.current)topRef.current.scrollTop=0; },[curPage,phase,storyPages]);

  const ai=async(messages)=>callAPI(provider,apiKey,model,SYS,messages);
  const addLog=e=>setGLog(l=>[...l,{day,...e}]);
  const updNpc=(name,u)=>setNpcMem(m=>({...m,[name]:{...(m[name]||{familiarity:0,profile:"",visitCount:0,lastTopics:[]}), ...u}}));

  // show a new story page
  function pushPage(text,isEvent,opts,next){
    setStoryPages(p=>[...p,{text,isEvent:!!isEvent}]);
    setCurPage(p=>p+1);
    setPageOpts(opts||null);
    setNextFn(next?{fn:next}:null);
    setPhase("story");
  }

  // ── DAY START ──
  async function startDay(d,curMoney){
    setPhase("loading");setLoading(true);
    setStoryPages([]);setCurPage(0);
    setCustIdx(0);setDayDone(false);setSat(null);setDrink([]);setCustomer(null);
    const bad=d%5===0;
    const p=`第${d}天，酒吧开业前。资金：${curMoney??money}，声望：${rep}，老板好感：${bossRel}。${bad?"今天主控状态特别差，内心活动要更阴暗消沉。":""}
生成今天开业前氛围描写（200-300字），描述喧嚣城夜晚、酒吧状态，以及老板简短出场或吩咐。穿插主控内心活动【心：...】。
返回JSON：{"text":"..."}`;
    const msgs=[{role:"user",content:p}];
    const resp=await ai(msgs);
    const parsed=parseJSON(resp);
    setMsgHist(msgs.concat([{role:"assistant",content:resp}]));
    setLoading(false);
    pushPage(parsed?.text||resp,false,null,()=>setPhase("idle"));
  }

  useEffect(()=>{ startDay(1,500); },[]);

  // ── NEXT CUSTOMER ──
  async function nextCustomer(){
    if(dayDone||custIdx>=4){await runEndDay();return;}
    setPhase("loading");setLoading(true);
    setDrink([]);setSat(null);

    const MAIN=["渡野","罗德西","万寂·维里塔","拉普瑟狄","千明·维里塔","塞西里斯","希音"];
    const MINOR=["露比","影子","柯恩","米洛","布蕾尔","叶菲姆","瑟琳","维拉","安琪","纪和","老关","小湘","阿卷"];
    const roll=Math.random();
    let npcName=null;
    if(roll<0.22){const w=[0.28,0.1,0.15,0.1,0.1,0.08,0.09];let r2=Math.random(),acc=0;for(let i=0;i<MAIN.length;i++){acc+=w[i]||0.1;if(r2<acc){npcName=MAIN[i];break;}}}
    else if(roll<0.65){npcName=MINOR[Math.floor(Math.random()*MINOR.length)];}

    const mem=npcName?(npcMem[npcName]||{familiarity:0,profile:"",visitCount:0,lastTopics:[]}):null;
    const fam=mem?.familiarity||0;
    const visits=mem?.visitCount||0;
    const bad=day%5===0;
    const isMain=MAIN.includes(npcName);

    const ctx=npcName
      ?`今天来的NPC：${npcName}。与主控熟悉度：${fam}。已来过${visits}次（0=第一次）。${visits>0&&mem?.profile?`上次记录：${mem.profile}。`:""}${visits>0&&mem?.lastTopics?.length?`聊过话题：${mem.lastTopics.join("、")}，请勿重复。`:""}${visits===0?"第一次来，不认识主控。":`回头客，熟悉程度对应熟悉度${fam}，不能太热络也不能完全陌生。`}请保持此NPC所有已知设定（外貌、性格、职业）完全不变。`
      :`今天来的是随机路人NPC，请从以下背景中选一种（不要中国风名字）：
帮派成员/投机者/记忆掮客/空壳人/评级歧视受害者/义体爱好者/噪音崇拜者/借酒消愁的普通人/情报掮客/亡命徒/风俗从业者。根据背景决定话多话少，性格各异。`;

    const prompt=`第${day}天，第${custIdx+1}位客人。资金：${money}，声望：${rep}。${bad?"今天主控状态特别差。":""}
${ctx}
生成客人进入酒吧的场景描写（必须1000字以上）：
1. 详细外貌（衣着、义体改造情况、特征、走路姿势）
2. 进门时的神态和动作
3. 落座后的表现
4. 与主控的初步互动（根据性格，可以是沉默也可以是寒暄）
5. 通过行为外貌隐含饮酒喜好线索（绝对不要直说）
6. 多处穿插主控内心活动【心：...】
还需给出3个调酒推理线索标签（客人喜好的口味）从以下选：烈/甜/苦/酸/清冽/果香/草本/木香/海洋/神秘/温柔/科技感/纯粹/花香
返回JSON：{"name":"客人名字","profile":"性格背景一句话","preference_tags":["标签1","标签2","标签3"],"is_main":${isMain},"text":"完整场景（1000字以上）"}`;

    const msgs=[...msgHist,{role:"user",content:prompt}];
    const resp=await ai(msgs);
    const parsed=parseJSON(resp);
    if(parsed){
      setCustomer({...parsed,memKey:npcName,familiarity:fam});
      setMsgHist(msgs.concat([{role:"assistant",content:resp}]));
      if(npcName)updNpc(npcName,{visitCount:visits+1,profile:parsed.profile||mem?.profile||"",familiarity:fam});
    }
    setLoading(false);
    pushPage(parsed?.text||resp,false,null,()=>setPhase("mixing"));
  }

  // ── SERVE DRINK ──
  async function serveDrink(){
    if(drink.length!==3)return;
    for(const id of drink){if((stock[id]||0)<1){alert("库存不足！");return;}}
    setPhase("loading");setLoading(true);
    const ns={...stock};for(const id of drink)ns[id]=(ns[id]||0)-1;setStock(ns);
    const names=drink.map(id=>INGS.find(i=>i.id===id)?.name);
    const tags=[...new Set(drink.flatMap(id=>INGS.find(i=>i.id===id)?.tags||[]))];
    const pref=customer?.preference_tags||[];
    const matches=tags.filter(t=>pref.includes(t)).length;
    const satRes=matches>=2?"high":matches===1?"mid":"low";
    setRep(r=>Math.max(0,Math.min(100,r+(satRes==="high"?5:satRes==="mid"?2:-2))));
    setMoney(m=>m+DRINK_PRICE);setSat(satRes);
    const fam=customer?.memKey?(npcMem[customer.memKey]?.familiarity??0):(customer?.familiarity??0);
    const bad=day%5===0;
    const prompt=`客人${customer?.name}收到调酒：${names.join("+")}。
客人喜好标签：${pref.join("、")}，调酒包含标签：${tags.join("、")}，匹配度：${satRes==="high"?"高":satRes==="mid"?"中":"低"}。
客人性格：${customer?.profile||""}。熟悉度：${fam}。${bad?"今天主控状态特别差。":""}
生成：1.客人品酒反应（150-250字，符合满意度和性格，话少的人就少说几句）2.穿插主控内心活动【心：...】
3.给出2-4个对话选项（符合客人性格，含一个送客选项）
返回JSON：{"text":"品酒反应描写","options":[{"id":0,"text":"选项"},{"id":1,"text":"送客，结束今晚的交谈"}]}`;
    const msgs=[...msgHist,{role:"user",content:prompt}];
    const resp=await ai(msgs);
    const parsed=parseJSON(resp);
    if(parsed){setMsgHist(msgs.concat([{role:"assistant",content:resp}]));}
    addLog({type:"drink",customer:customer?.name,sat:satRes,drink:names.join("+")});
    setLoading(false);
    if(parsed)pushPage(parsed.text,false,parsed.options);
  }

  // ── DIALOG CHOICE ──
  async function chooseOpt(idx){
    const opt=pageOpts?.[idx];if(!opt)return;
    const fare=["送客","结束今晚","告别","结束交谈","不想聊","嗯。（沉默）","好了，去休息"].some(k=>opt.text.includes(k));
    if(fare&&phase!=="boss_chat"){await doFarewell();return;}
    if(fare&&phase==="boss_chat"){await afterBoss();return;}
    setPhase("loading");setLoading(true);
    const memKey=customer?.memKey;
    const mem=memKey?(npcMem[memKey]||{}):{};
    const fam=mem?.familiarity??customer?.familiarity??0;
    const topics=mem?.lastTopics||[];
    const bad=day%5===0;
    const prompt=`玩家选择：「${opt.text}」
客人：${customer?.name}，熟悉度：${fam}，性格：${customer?.profile||""}。
${topics.length?`之前话题：${topics.join("、")}，不要重复。`:""}${customer?.is_main?"这是主要NPC，性格设定固定不变。":""}${bad?"今天主控状态特别差。":""}
要求：1.对话展开200-350字，口语化，符合性格（话少的就少说）2.穿插【心：...】
3.熟悉度>=40可隐晦涉及灰色话题（自然，不强求）4.熟悉度>=70主控追问才透露（不会直说）
5.是否触发特殊事件（约12%概率）6.给出2-4个新选项（含送客选项）
返回JSON：{"text":"对话内容","quality":"good/mid/bad","familiarity_gain":数字,"topics":["话题"],"special_event":null或{"title":"...","description":"..."},"options":[{"id":0,"text":"选项"},{"id":1,"text":"送客，结束今晚的交谈"}]}`;
    const msgs=[...msgHist,{role:"user",content:prompt}];
    const resp=await ai(msgs);
    const parsed=parseJSON(resp);
    if(parsed){
      const nf=Math.max(0,Math.min(100,fam+(parsed.familiarity_gain||0)));
      setCustomer(c=>({...c,familiarity:nf}));
      if(memKey)updNpc(memKey,{familiarity:nf,lastTopics:[...topics,...(parsed.topics||[])].slice(-6)});
      setMsgHist(msgs.concat([{role:"assistant",content:resp}]));
      addLog({type:"dialog",customer:customer?.name,quality:parsed.quality});
      if(parsed.special_event){await doSpecialEvent(parsed.special_event,msgs.concat([{role:"assistant",content:resp}]));return;}
      setLoading(false);
      pushPage(parsed.text,false,parsed.options);
    } else setLoading(false);
  }

  // ── BOSS CHAT CHOICE ──
  async function chooseBossOpt(idx){
    const opt=pageOpts?.[idx];if(!opt)return;
    if(["算了","不想聊","去休息","嗯。（沉默）","好了"].some(k=>opt.text.includes(k))){await afterBoss();return;}
    setPhase("loading");setLoading(true);
    const bad=day%5===0;
    const prompt=`主控选择：「${opt.text}」
继续老板和主控的对话。${bad?"今天主控状态特别差。":""}
老板给出回应（不会多问，但主控愿意说他会认真听）。穿插【心：...】。
生成对话展开（150-200字），给出2-3个选项（含一个结束对话的选项）。
返回JSON：{"text":"...","boss_rel_change":数字(-3到3),"options":[{"id":0,"text":"选项"},{"id":1,"text":"好了，去休息了"}]}`;
    const msgs=[...msgHist,{role:"user",content:prompt}];
    const resp=await ai(msgs);
    const parsed=parseJSON(resp);
    if(parsed){
      setBossRel(b=>Math.max(0,Math.min(100,b+(parsed.boss_rel_change||0))));
      setMsgHist(msgs.concat([{role:"assistant",content:resp}]));
      setLoading(false);
      pushPage(parsed.text,false,parsed.options);
      setPhase("boss_chat");
    } else setLoading(false);
  }

  // ── FAREWELL ──
  async function doFarewell(){
    setPhase("loading");setLoading(true);
    const fam=customer?.memKey?(npcMem[customer.memKey]?.familiarity??0):(customer?.familiarity??0);
    const bad=day%5===0;
    const prompt=`客人${customer?.name}离开酒吧（熟悉度${fam}）。${bad?"今天主控状态特别差。":""}
生成80-120字的送客描写，自然收尾，符合客人性格，穿插【心：...】。
返回JSON：{"text":"..."}`;
    const msgs=[...msgHist,{role:"user",content:prompt}];
    const resp=await ai(msgs);
    const parsed=parseJSON(resp);
    setMsgHist(msgs.concat([{role:"assistant",content:resp}]));
    const ni=custIdx+1;setCustIdx(ni);setCustomer(null);setDrink([]);setSat(null);
    setLoading(false);
    pushPage(parsed?.text||resp,false,null,ni>=4?(()=>runEndDay()):(()=>setPhase("idle")));
  }

  // ── SPECIAL EVENT ──
  async function doSpecialEvent(evt,msgs){
    setLoading(true);
    const bad=day%5===0;
    const prompt=`发生特殊事件：${evt.title} — ${evt.description}
生成事件详细描写（500字以上），含：紧张感、主控反应（含【心：...】）、老板可能出现、事件结局。${bad?"今天主控状态特别差。":""}
注意：这是特殊事件不是游戏结局，事件后当天营业结束。
返回JSON：{"text":"...","money_change":数字,"boss_change":数字}`;
    const nMsgs=[...msgs,{role:"user",content:prompt}];
    const resp=await ai(nMsgs);
    const parsed=parseJSON(resp);
    if(parsed){
      setMoney(m=>m+(parsed.money_change||0));
      setBossRel(b=>Math.max(0,Math.min(100,b+(parsed.boss_change||0))));
      setMsgHist(nMsgs.concat([{role:"assistant",content:resp}]));
      addLog({type:"special_event",title:evt.title});
    }
    setDayDone(true);setCustomer(null);
    setLoading(false);
    pushPage(parsed?.text||evt.description,true,null,()=>runEndDay());
  }

  // ── END DAY ──
  async function runEndDay(){
    setPhase("loading");setLoading(true);
    const bad=day%5===0;
    const prompt=`第${day}天营业结束。资金：${money}，声望：${rep}，老板好感：${bossRel}。${bad?"今天是主控状态特别差的一天。":""}
生成100-150字营业结束的氛围描写，可含老板简短出场或主控内心感触【心：...】。
返回JSON：{"text":"..."}`;
    const msgs=[...msgHist,{role:"user",content:prompt}];
    const resp=await ai(msgs);
    const parsed=parseJSON(resp);
    setMsgHist(msgs.concat([{role:"assistant",content:resp}]));
    setDayDone(true);
    setLoading(false);
    pushPage(parsed?.text||resp,false,null,()=>doBossChat());
  }

  // ── BOSS CHAT ──
  async function doBossChat(){
    setPhase("boss_chat");setLoading(true);
    const bad=day%5===0;
    const recent=gLog.slice(-6).map(l=>{
      if(l.type==="drink")return `第${l.day}天客人${l.customer}调酒${l.sat==="high"?"很满意":l.sat==="mid"?"还行":"不满意"}`;
      if(l.type==="special_event")return `第${l.day}天发生了${l.title}`;
      return "";
    }).filter(Boolean).join("；");
    const prompt=`第${day}天营业结束后，老板和主控在收拾时短暂对话。
老板：不张扬，看起来有点凶，靠谱有安全感，不轻易表达情感，绝对中立。
${recent?`今天情况：${recent}。`:""}${bad?"今天主控状态特别差，老板可能察觉到了。":""}资金：${money}，声望：${rep}。
老板用随意不经意的方式聊主控过去的事（13岁父母双亡、在喧嚣城的生活），每次聊的角度不同不要重复。
对话要自然，不说教，就像深夜两个人随便说几句话。穿插主控内心活动【心：...】。
返回JSON：{"text":"老板开场白和场景（200-280字）","options":[{"id":0,"text":"选项"},{"id":1,"text":"选项"},{"id":2,"text":"嗯。（沉默）"}]}`;
    const msgs=[...msgHist,{role:"user",content:prompt}];
    const resp=await ai(msgs);
    const parsed=parseJSON(resp);
    if(parsed){setMsgHist(msgs.concat([{role:"assistant",content:resp}]));}
    setLoading(false);
    if(parsed)pushPage(parsed.text,false,parsed.options);
    setPhase("boss_chat");
  }

  // ── AFTER BOSS ──
  async function afterBoss(){
    if(day>=MAX_DAYS){await generateEnding();return;}
    const nd=day+1;
    setDay(nd);
    const nm=money;
    await startDay(nd,nm);
  }

  // ── ENDING ──
  async function generateEnding(){
    setPhase("end");setLoading(true);
    const npcRels=Object.entries(npcMem).map(([n,m])=>`${n}熟悉度${m.familiarity}`).join("、")||"几乎没有深交";
    const events=gLog.filter(l=>l.type==="special_event").map(l=>l.title).join("、")||"无";
    const dl=gLog.filter(l=>l.type==="drink");
    const prompt=`第30天，三十天的酒保生涯结束了。根据以下数据生成游戏结局：
最终资金：${money}，声望：${rep}，老板好感：${bossRel}
NPC关系：${npcRels}，特殊事件：${events}
调酒总次数：${dl.length}，高满意度：${dl.filter(l=>l.sat==="high").length}次
生成独特结局（600-900字）：
- 体现玩家这30天遇见了哪些人、做了什么
- 体现主控这个悲观消沉的年轻人，内心的变化（可以有也可以没有，要真实）
- 结局不需要完全好或完全坏，要符合真实人生的复杂性
- 多处穿插主控最后的内心独白【心：...】
- 最后一段要有余韵（一个小画面、一句话或开放性结尾）
返回JSON：{"title":"结局标题（2-4字）","text":"结局内容"}`;
    const msgs=[...msgHist,{role:"user",content:prompt}];
    const resp=await ai(msgs);
    const parsed=parseJSON(resp);
    setLoading(false);
    if(parsed)pushPage(`◆ ${parsed.title} ◆\n\n${parsed.text}`,false,null);
  }

  // ── SHOP ──
  const cartTotal=()=>Object.entries(cart).reduce((s,[id,cnt])=>s+(ING_PRICE[id]||0)*cnt,0);
  function confirmBuy(){
    const t=cartTotal();
    if(t>money){alert("资金不足！");return;}
    setMoney(m=>m-t);
    setStock(s=>{const n={...s};Object.entries(cart).forEach(([id,cnt])=>{n[id]=(n[id]||0)+cnt;});return n;});
    setCart({});setPhase("idle");
  }

  // ── current page text ──
  const curText=storyPages[curPage]?.text||"";
  const curIsEvent=storyPages[curPage]?.isEvent||false;
  const famDisp=(()=>{if(!customer)return 0;if(customer.memKey&&npcMem[customer.memKey])return npcMem[customer.memKey].familiarity;return customer.familiarity||0;})();

  // ── SHOP UI ──
  if(phase==="shop") return(
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",justifyContent:"center",padding:"20px 16px"}}>
      <div style={{width:"100%",maxWidth:640}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,color:C.accD,fontSize:12}}>
          <span style={{letterSpacing:2}}>进货补给站</span>
          <span style={{color:"#e8c040",fontWeight:"bold"}}>¥ {money}</span>
          <span style={{color:C.acc}}>购物车 ¥{cartTotal()}</span>
        </div>
        <Panel style={{padding:14,marginBottom:12}}>
          {INGS.map(ing=>(
            <div key={ing.id} style={{display:"flex",alignItems:"center",gap:8,padding:"9px 4px",borderBottom:`1px solid ${C.brd}`}}>
              <span style={{width:7,height:7,borderRadius:"50%",background:ing.col,flexShrink:0}}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{color:C.text,fontSize:13}}>{ing.name}</div>
                <div style={{color:C.textM,fontSize:11}}>{ing.desc}</div>
              </div>
              <span style={{color:C.textM,fontSize:11,width:48,textAlign:"right"}}>库存 {stock[ing.id]||0}</span>
              <span style={{color:"#a07828",fontSize:11,width:40,textAlign:"right"}}>¥{ING_PRICE[ing.id]}</span>
              <button onClick={()=>{setCart(c=>{const n={...c};if(n[ing.id]>1)n[ing.id]--;else delete n[ing.id];return n;})}} style={{background:"none",border:"none",color:C.textM,cursor:"pointer",padding:"2px 8px",fontSize:16}}>－</button>
              <span style={{color:C.acc,width:18,textAlign:"center",fontSize:13}}>{cart[ing.id]||0}</span>
              <button onClick={()=>setCart(c=>({...c,[ing.id]:(c[ing.id]||0)+1}))} style={{background:"none",border:"none",color:C.textM,cursor:"pointer",padding:"2px 8px",fontSize:16}}>＋</button>
            </div>
          ))}
        </Panel>
        <div style={{display:"flex",gap:8}}>
          <Btn onClick={confirmBuy} disabled={cartTotal()===0} style={{flex:1,padding:"13px 0"}}>确认购买 ¥{cartTotal()}</Btn>
          <Btn onClick={()=>setPhase("idle")} variant="out" style={{padding:"13px 20px"}}>返回</Btn>
        </div>
      </div>
    </div>
  );

  // ── MAIN LAYOUT ──
  return(
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",justifyContent:"center"}}>
      <div style={{width:"100%",maxWidth:720,minHeight:"100vh",display:"flex",flexDirection:"column"}}>

        {/* STATUS */}
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",
          padding:"8px 16px",background:C.bgD,borderBottom:`1px solid ${C.brd}`,
          fontSize:11,color:C.textM,flexShrink:0,gap:4,flexWrap:"wrap"}}>
          <span>第 <b style={{color:C.acc}}>{day}</b>/{MAX_DAYS}天 &nbsp;·&nbsp; 客人 <b style={{color:C.acc}}>{custIdx}</b>/4</span>
          <span style={{color:"#c4b030",fontWeight:"bold",fontSize:13}}>¥ {money}</span>
          <span>声望 <b style={{color:C.acc}}>{rep}</b> &nbsp;老板好感 <b style={{color:C.acc}}>{bossRel}</b></span>
          <button onClick={onReset} style={{background:"none",border:"none",color:C.textM,fontSize:10,cursor:"pointer",letterSpacing:1}}>重置</button>
        </div>

        {/* CUSTOMER BAR */}
        {customer&&(
          <div style={{display:"flex",alignItems:"center",gap:8,padding:"6px 16px",
            background:C.bgD,borderBottom:`1px solid ${C.brd}`,fontSize:12,flexShrink:0,flexWrap:"wrap"}}>
            <span style={{color:C.accB,fontWeight:"bold"}}>{customer.name}</span>
            {customer.is_main&&<span style={{color:C.purp,fontSize:10}}>★</span>}
            <span style={{color:C.textM}}>熟悉度</span>
            <div style={{width:60,height:4,background:C.bgP,borderRadius:2,overflow:"hidden"}}>
              <div style={{height:"100%",background:C.teal,width:`${famDisp}%`,transition:"width .5s"}}/>
            </div>
            <span style={{color:C.teal,fontSize:11}}>{famDisp}</span>
            {sat&&<span style={{marginLeft:"auto",fontWeight:"bold",fontSize:11,color:SAT[sat].c}}>{SAT[sat].l}</span>}
          </div>
        )}

        {/* CONTENT */}
        {phase==="mixing"?(
          <div style={{flex:1,overflowY:"auto",padding:"18px 16px 8px"}}>
            <div style={{color:C.textM,fontSize:12,marginBottom:14}}>
              为 <span style={{color:C.accB,fontWeight:"bold"}}>{customer?.name}</span> 调酒 &nbsp;—&nbsp; 选择三种原料
              <span style={{color:C.acc,marginLeft:6}}>（已选 {drink.length}/3）</span>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
              {INGS.map(ing=>{
                const sel=drink.includes(ing.id);
                const noS=(stock[ing.id]||0)<1;
                return(
                  <button key={ing.id} onClick={()=>{if(!noS){setDrink(p=>{if(p.includes(ing.id))return p.filter(x=>x!==ing.id);if(p.length>=3)return[...p.slice(1),ing.id];return[...p,ing.id];});}}}
                    style={{padding:"10px 12px",textAlign:"left",background:sel?C.bgPL:C.bgP,
                      border:`1px solid ${sel?C.acc:C.brd}`,cursor:noS?"not-allowed":"pointer",
                      opacity:noS?.35:1,transition:"all .12s"}}>
                    <div style={{display:"flex",alignItems:"center",gap:7}}>
                      <span style={{width:7,height:7,borderRadius:"50%",background:ing.col,flexShrink:0}}/>
                      <span style={{color:sel?C.accB:C.text,fontSize:13,fontWeight:sel?"bold":"normal"}}>{ing.name}</span>
                      <span style={{marginLeft:"auto",color:C.textM,fontSize:11}}>{stock[ing.id]||0}</span>
                    </div>
                    <div style={{color:C.textM,fontSize:11,marginTop:4,paddingLeft:14}}>{ing.desc}</div>
                  </button>
                );
              })}
            </div>
          </div>
        ):(
          <div ref={topRef} style={{flex:1,overflowY:"auto",padding:"28px 24px 12px"}}>
            {loading?<Spinner/>:<StoryText text={curText} isEvent={curIsEvent}/>}
          </div>
        )}

        {/* CONTROLS */}
        <div style={{flexShrink:0,padding:"12px 16px",borderTop:`1px solid ${C.brd}`,background:C.bgD}}>

          {/* IDLE */}
          {phase==="idle"&&!loading&&(
            <div style={{display:"flex",gap:8}}>
              <Btn onClick={nextCustomer} style={{flex:1,padding:"13px 0",letterSpacing:1}}>迎接下一位客人 →</Btn>
              <Btn onClick={()=>{setCart({});setPhase("shop");}} variant="out" style={{padding:"13px 18px"}}>进货</Btn>
            </div>
          )}

          {/* MIXING */}
          {phase==="mixing"&&!loading&&(
            drink.length===3?(
              <Btn onClick={serveDrink} style={{width:"100%",padding:"14px 0",letterSpacing:2,fontSize:14,fontWeight:"bold"}}>上酒 →</Btn>
            ):(
              <div style={{padding:"13px 0",textAlign:"center",border:`1px solid ${C.brd}`,color:C.textM,fontSize:13}}>
                还需选择 {3-drink.length} 种原料
              </div>
            )
          )}

          {/* CONTINUE */}
          {!loading&&pageOpts===null&&nextFn&&phase!=="idle"&&phase!=="mixing"&&phase!=="end"&&(
            <Btn onClick={()=>{const f=nextFn.fn;setNextFn(null);f&&f();}} style={{width:"100%",padding:"13px 0"}}>
              继续 ▶
            </Btn>
          )}

          {/* OPTIONS */}
          {!loading&&pageOpts&&pageOpts.length>0&&(
            <div style={{display:"flex",flexDirection:"column",gap:5}}>
              {pageOpts.map((opt,i)=>(
                <Btn key={opt.id??i} variant="choice"
                  onClick={()=>phase==="boss_chat"?chooseBossOpt(i):chooseOpt(i)}
                  style={{padding:"11px 16px",textAlign:"left",fontSize:13,lineHeight:1.6}}>
                  {opt.text}
                </Btn>
              ))}
            </div>
          )}

          {/* END */}
          {phase==="end"&&!loading&&(
            <Btn onClick={onReset} style={{width:"100%",padding:"13px 0",letterSpacing:2}}>重新开始一段旅程</Btn>
          )}

          {loading&&phase!=="mixing"&&<Spinner/>}
        </div>

      </div>
    </div>
  );
}

/* ════════════════════════════════════
   ROOT APP
════════════════════════════════════ */
function App(){
  const [s,setS]=useState("intro"); // intro|api|title|game
  const [cfg,setCfg]=useState(null);
  if(s==="intro") return <IntroScreen onNext={()=>setS("api")}/>;
  if(s==="api")   return <ApiScreen onConfirm={c=>{setCfg(c);setS("title");}}/>;
  if(s==="title") return <TitleScreen onStart={()=>setS("game")}/>;
  return <Game cfg={cfg} onReset={()=>setS("intro")}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
