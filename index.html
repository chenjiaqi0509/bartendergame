async function callAPI(provider,apiKey,model,system,messages){
  if(provider==="anthropic"){
    const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01"},
      body:JSON.stringify({model,max_tokens:2000,system,messages})});
    const d=await r.json();
    if(d.error)throw new Error(d.error.message);
    return d.content.map(b=>b.text||"").join("");
  }
  if(provider==="openai"||provider==="deepseek"){
    const url=provider==="deepseek"?"https://api.deepseek.com/v1/chat/completions":"https://api.openai.com/v1/chat/completions";
    const r=await fetch(url,{method:"POST",
      headers:{"Content-Type":"application/json","Authorization":`Bearer ${apiKey}`},
      body:JSON.stringify({model,max_tokens:2000,messages:[{role:"system",content:system},...messages]})});
    const d=await r.json();
    if(d.error)throw new Error(d.error.message||JSON.stringify(d.error));
    return d.choices[0].message.content;
  }
  if(provider==="gemini"){
    const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`,{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        systemInstruction:{parts:[{text:system}]},
        contents:messages.map(m=>({role:m.role==="assistant"?"model":"user",parts:[{text:m.content}]})),
        generationConfig:{maxOutputTokens:2000}
      })});
    const d=await r.json();
    if(d.error)throw new Error(d.error.message);
    return d.candidates[0].content.parts.map(p=>p.text||"").join("");
  }
  throw new Error("未知服务商");
}

async function testAPI(provider,apiKey,model){
  return callAPI(provider,apiKey,model,"You are helpful.",[{role:"user",content:"hi just say ok"}]);

function parseJSON(txt){
  try{const m=txt.match(/```json\s*([\s\S]*?)```/);return JSON.parse(m?m[1]:txt.trim());}
  catch{try{const s=txt.indexOf("{"),e=txt.lastIndexOf("}");if(s!==-1&&e!==-1)return JSON.parse(txt.slice(s,e+1));}catch{}return null;}
}

function fixNewlines(t){return t?t.replace(/\\n/g,"\n").replace(/\\t/g,"\t"):"";}

/* ════════════════════════════════════
   STORY TEXT RENDERER
════════════════════════════════════ */
function StoryText({text,isEvent}){
  if(!text)return null;
  const clean=fixNewlines(text);
  const parts=clean.split(/(【心[：:]([^】]*)】)/g);
  const els=[];let i=0;
  while(i<parts.length){
    const p=parts[i];
    if(p&&/^【心[：:]/.test(p)){
      const inner=parts[i+1]||p.replace(/^【心[：:]/,"").replace(/】$/,"");
      els.push(<span key={i} className="thought">（{inner}）</span>);
      i+=2;
    } else {
      if(p){
        const lines=p.split("\n");
        lines.forEach((line,li)=>{
          els.push(<span key={`${i}-${li}`}>{line}</span>);
          if(li<lines.length-1)els.push(<br key={`${i}-br-${li}`}/>);
        });
      }
      i++;
    }
  }
  return(
    <div className={isEvent?"event-block":""} style={{lineHeight:2.0,fontSize:15,color:C.text}}>
      {els}
    </div>
  );
}

function Panel({children,style}){
  const cs={position:"relative",border:`1px solid ${C.brd}`,background:C.bgP,...style};
  const corner=(top,right,bottom,left)=>({
    position:"absolute",
    ...(top!=null?{top:0}:{}),
    ...(bottom!=null?{bottom:0}:{}),
    ...(left!=null?{left:0}:{}),
    ...(right!=null?{right:0}:{}),
    width:8,height:8,
    borderTop:top?`2px solid ${C.acc}`:"none",
    borderBottom:bottom?`2px solid ${C.acc}`:"none",
    borderLeft:left?`2px solid ${C.acc}`:"none",
    borderRight:right?`2px solid ${C.acc}`:"none",
  });
  return(
    <div style={cs}>
      <span style={corner(true,null,null,true)}/>
      <span style={corner(true,true,null,null)}/>
      <span style={corner(null,null,true,true)}/>
      <span style={corner(null,true,true,null)}/>
      {children}
    </div>
  );
}

function Btn({children,onClick,disabled,variant="norm",style}){

  };

  return(

}

    const isRemix = day % 5 === 0;
    const targetSrc = isRemix ? BGM.remix : BGM.normal;
    
    if(a.src !== targetSrc) {
      a.src = targetSrc;
      // 只有在非loading状态尝试播放，避免未交互错误
      a.play().catch(e=>console.log("Auto-play blocked, waiting for interaction"));
    }
    
    return () => { a.pause(); };
  }, [day]);

  // 确保用户交互后播放音乐
  useEffect(()=>{

  async function nextCustomer(){

    setPhase("loading");setLoading(true);
    setDrink([]);setSat(null);
    setChatCount(0); // 重置对话轮数

    const MAIN=["渡野","罗德西","万寂·维里塔","拉普瑟狄","千明·维里塔","塞西里斯","希音"];

    const roll=Math.random();
    let npcName=null;
    if(roll<0.22){const w=[0.28,0.1,0.15,0.1,0.1,0.08,0.09];let r2=Math.random(),acc=0;for(let i=0;i<MAIN.length;i++){acc+=w[i]||0.1;if(r2<acc){npcName=MAIN[i];break;}}}
    else if(roll<0.65){npcName=MINOR[Math.floor(Math.random()*MINOR.length)];}

    const mem=npcName?(npcMem[npcName]||{familiarity:0,profile:"",visitCount:0,lastTopics:[]}):null;

      :`今天来的是随机路人NPC，请从以下背景中选一种（不要中国风名字）：
帮派成员/投机者/记忆掮客/空壳人/评级歧视受害者/义体爱好者/噪音崇拜者/借酒消愁的普通人/情报掮客/亡命徒/风俗从业者。`;

${ctx}
生成客人进入酒吧的场景描写（800-1000字）：
1. 详细外貌（衣着、义体改造情况、特征）
2. 进门与落座。
3. **重要：主控非常冷淡**，除非熟悉度>60，否则不要寒暄，直接等对方点单或眼神示意。

返回JSON：{"name":"客人名字","profile":"性格背景一句话","preference_tags":["标签1","标签2","标签3"],"is_main":${isMain},"text":"完整场景"}`;

  // ── SERVE DRINK ──
  async function serveDrink(){
    if(drink.length!==3)return;
    for(const id of drink){if((stock[id]||0)<1){alert("库存不足！");return;}}
    setPhase("loading");setLoading(true);
    const ns={...stock};for(const id of drink)ns[id]=(ns[id]||0)-1;setStock(ns);
    const names=drink.map(id=>INGS.find(i=>i.id===id)?.name);
    const tags=[...new Set(drink.flatMap(id=>INGS.find(i=>i.id===id)?.tags||[]))];
    const pref=customer?.preference_tags||[];
    const matches=tags.filter(t=>pref.includes(t)).length;
    const satRes=matches>=2?"high":matches===1?"mid":"low";
    setRep(r=>Math.max(0,Math.min(100,r+(satRes==="high"?5:satRes==="mid"?2:-2))));
    setMoney(m=>m+DRINK_PRICE);setSat(satRes);
    const fam=customer?.memKey?(npcMem[customer.memKey]?.familiarity??0):(customer?.familiarity??0);
    const bad=day%5===0;
    
    // 第一次对话
    setChatCount(1); 

    const prompt=`客人${customer?.name}收到调酒：${names.join("+")}。
客人喜好标签：${pref.join("、")}，调酒包含标签：${tags.join("、")}，匹配度：${satRes==="high"?"高":satRes==="mid"?"中":"低"}。
客人性格：${customer?.profile||""}。熟悉度：${fam}。
生成：
1. 客人品酒反应（简短，不要长篇大论）。
2. **主控反应**：如果熟悉度<40，主控几乎不说话，只是擦杯子或看别处。熟悉度高才稍微回应。
3. 给出2-4个对话选项。**除非熟悉度>60，否则不要出现打听职业/私事的选项，只聊酒或沉默。**
返回JSON：{"text":"品酒反应描写","options":[{"id":0,"text":"选项"},{"id":1,"text":"送客，结束今晚"}]}`;
    const msgs=[...msgHist,{role:"user",content:prompt}];
    const resp=await ai(msgs);

    if(parsed){setMsgHist(msgs.concat([{role:"assistant",content:resp}]));}
    addLog({type:"drink",customer:customer?.name,sat:satRes,drink:names.join("+")});
    setLoading(false);
    if(parsed)pushPage(parsed.text,false,parsed.options);
  }

    if(fare&&phase!=="boss_chat"){await doFarewell();return;}

    setPhase("loading");setLoading(true);

    const newCount = chatCount + 1;

    const topics=mem?.lastTopics||[];
    const bad=day%5===0;
    const prompt=`玩家选择：「${opt.text}」
客人：${customer?.name}，熟悉度：${fam}。当前第${newCount}轮对话。
要求：
1. **非常简短**。不要长篇大论，每段对话不超过150字。

          <div style={{flex:1,overflowY:"auto",padding:"18px 16px 8px"}}>
            <div style={{color:C.textM,fontSize:12,marginBottom:14}}>
              为 <span style={{color:C.accB,fontWeight:"bold"}}>{customer?.name}</span> 调酒 &nbsp;—&nbsp; 选择三种原料
              <span style={{color:C.acc,marginLeft:6}}>（已选 {drink.length}/3）</span>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
              {INGS.map(ing=>{
                const sel=drink.includes(ing.id);
                const noS=(stock[ing.id]||0)<1;
                return(
                  <button key={ing.id} onClick={()=>{if(!noS){setDrink(p=>{if(p.includes(ing.id))return p.filter(x=>x!==ing.id);if(p.length>=3)return[...p.slice(1),ing.id];return[...p,ing.id];});}}}
                    style={{padding:"10px 12px",textAlign:"left",background:sel?C.bgPL:C.bgP,
                      border:`1px solid ${sel?C.acc:C.brd}`,cursor:noS?"not-allowed":"pointer",
                      opacity:noS?.35:1,transition:"all .12s"}}>
                    <div style={{display:"flex",alignItems:"center",gap:7}}>
                      <span style={{width:7,height:7,borderRadius:"50%",background:ing.col,flexShrink:0}}/>
                      <span style={{color:sel?C.accB:C.text,fontSize:13,fontWeight:sel?"bold":"normal"}}>{ing.name}</span>
                      <span style={{marginLeft:"auto",color:C.textM,fontSize:11}}>{stock[ing.id]||0}</span>
                    </div>
                    <div style={{color:C.textM,fontSize:11,marginTop:4,paddingLeft:14}}>{ing.desc}</div>
                  </button>
                );
              })}
            </div>
          </div>
        ):(
          <div ref={topRef} style={{flex:1,overflowY:"auto",padding:"28px 24px 12px"}}>
            {loading?<Spinner/>:<StoryText text={curText} isEvent={curIsEvent}/>}
          </div>
        )}

        {/* CONTROLS */}
        <div style={{flexShrink:0,padding:"12px 16px",borderTop:`1px solid ${C.brd}`,background:C.bgD}}>

          {/* IDLE */}
          {phase==="idle"&&!loading&&(
            <div style={{display:"flex",gap:8}}>
              <Btn onClick={nextCustomer} style={{flex:1,padding:"13px 0",letterSpacing:1}}>迎接下一位客人 →</Btn>
              <Btn onClick={()=>{setCart({});setPhase("shop");}} variant="out" style={{padding:"13px 18px"}}>进货</Btn>
            </div>
          )}

          {/* MIXING */}
          {phase==="mixing"&&!loading&&(
            drink.length===3?(
              <Btn onClick={serveDrink} style={{width:"100%",padding:"14px 0",letterSpacing:2,fontSize:14,fontWeight:"bold"}}>上酒 →</Btn>
            ):(
              <div style={{padding:"13px 0",textAlign:"center",border:`1px solid ${C.brd}`,color:C.textM,fontSize:13}}>
                还需选择 {3-drink.length} 种原料
              </div>
            )
          )}

          {/* CONTINUE */}
          {!loading&&pageOpts===null&&nextFn&&phase!=="idle"&&phase!=="mixing"&&phase!=="end"&&(
            <Btn onClick={()=>{const f=nextFn.fn;setNextFn(null);f&&f();}} style={{width:"100%",padding:"13px 0"}}>
              继续 ▶
            </Btn>
          )}

          {/* OPTIONS */}
          {!loading&&pageOpts&&pageOpts.length>0&&(
            <div style={{display:"flex",flexDirection:"column",gap:5}}>
              {pageOpts.map((opt,i)=>(
                <Btn key={opt.id??i} variant="choice"
                  onClick={()=>phase==="boss_chat"?chooseBossOpt(i):chooseOpt(i)}
                  style={{padding:"11px 16px",textAlign:"left",fontSize:13,lineHeight:1.6}}>
                  {opt.text}
                </Btn>
              ))}
            </div>
          )}

          {/* END */}
          {phase==="end"&&!loading&&(
            <Btn onClick={onReset} style={{width:"100%",padding:"13px 0",letterSpacing:2}}>重新开始一段旅程</Btn>
          )}

          {loading&&phase!=="mixing"&&<Spinner/>}
        </div>

      </div>
    </div>
  );
}

/* ════════════════════════════════════
   ROOT APP
════════════════════════════════════ */
function App(){
  const [s,setS]=useState("intro");
  const [cfg,setCfg]=useState(null);
  if(s==="intro") return <IntroScreen onNext={()=>setS("api")}/>;
  if(s==="api")   return <ApiScreen onConfirm={c=>{setCfg(c);setS("title");}}/>;
  if(s==="title") return <TitleScreen onStart={()=>setS("game")}/>;
  return <Game cfg={cfg} onReset={()=>setS("intro")}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
